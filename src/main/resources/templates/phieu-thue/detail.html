<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">
    <h1>Chi tiết phiếu thuê</h1>
    <div class="msg-ok"  th:if="${success}" th:text="${success}"></div>
    <div class="msg-err" th:if="${error}"   th:text="${error}"></div>
    <table style="max-width:560px; margin-bottom:18px;">
        <tr><th>Mã phiếu</th>       <td th:text="'PT-' + ${pt.id}"></td></tr>
        <tr><th>Khách hàng</th>     <td th:text="${kh?.hoTen}"></td></tr>
        <tr><th>Ngày tạo</th>       <td th:text="${pt.ngayTao}"></td></tr>
        <tr><th>Ngày hẹn lấy</th>   <td th:text="${pt.ngayHenLay}"></td></tr>
        <tr><th>Ngày hẹn trả</th>   <td th:text="${pt.ngayHenTra}"></td></tr>
        <tr><th>Hình thức</th>      <td th:text="${pt.hinhThuc}"></td></tr>
        <tr>
            <th>Trạng thái</th>
            <td>
                <span class="badge" th:classappend="${pt.trangThai.name()}"
                      th:text="${pt.trangThai.name() == 'CHO_DAT_COC'  ? 'Chờ đặt cọc'  :
                                 pt.trangThai.name() == 'CHO_XAC_NHAN' ? 'Chờ xác nhận' : 'Đã hủy'}">
                </span>
            </td>
        </tr>
        <tr>
            <th>Tiền đặt cọc</th>
            <td th:text="${#numbers.formatDecimal(pt.tienDatCoc, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
        </tr>
        <tr>
            <th>Trạng thái cọc</th>
            <td th:text="${pt.trangThaiDatCoc.name() == 'CHUA_THANH_TOAN' ? 'Chưa thanh toán' :
                           pt.trangThaiDatCoc.name() == 'DA_THANH_TOAN'   ? 'Đã thanh toán'   : 'Đã hoàn trả'}">
            </td>
        </tr>
    </table>

    <h2>Danh sách trang phục</h2>
    <table style="margin-bottom:18px;">
        <thead>
            <tr>
                <th>#</th>
                <th>Tên trang phục</th>
                <th>Loại</th>
                <th>Số lượng</th>
                <th>Đơn giá</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ct, s : ${pt.chiTiet}">
                <td th:text="${s.count}"></td>
                <td th:text="${trangPhucs[s.index] != null ? trangPhucs[s.index].tenTrangPhuc : 'ID ' + ct.trangPhucId}"></td>
                <td th:text="${trangPhucs[s.index] != null ? trangPhucs[s.index].loaiTrangPhuc?.tenLoaiTrangPhuc : ''}"></td>
                <td th:text="${ct.soLuong}"></td>
                <td th:text="${#numbers.formatDecimal(ct.donGia, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
            </tr>
        </tbody>
    </table>

    <div>
        <form class="inline"
              th:if="${pt.trangThai.name() == 'CHO_DAT_COC'}"
              th:action="@{/phieu-thue/{id}/dat-coc(id=${pt.id})}"
              method="post"
              onsubmit="return confirm('Xác nhận đặt cọc?')">
            <input type="hidden" name="khachHangId" th:value="${kh.id}"/>
            <button type="submit" class="btn">Xác nhận đặt cọc</button>
        </form>
        <form class="inline"
              th:if="${pt.trangThai.name() != 'DA_HUY'}"
              th:action="@{/phieu-thue/{id}/huy(id=${pt.id})}"
              method="post"
              onsubmit="return confirm('Hủy phiếu thuê này?')">
            <input type="hidden" name="khachHangId" th:value="${kh.id}"/>
            <button type="submit" class="btn btn-danger">Hủy phiếu</button>
        </form>
        <a id="btn-cua-toi" href="#" class="btn">Phiếu thuê của tôi</a>
    </div>
    <script>
        document.getElementById('btn-cua-toi').href = '/phieu-thue/cua-toi?khachHangId=' + KHACH_HANG_ID;
    </script>
</div>
</body>
</html>
