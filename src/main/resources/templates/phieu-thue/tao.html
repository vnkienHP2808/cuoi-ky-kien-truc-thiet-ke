<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">
    <h1>Tạo phiếu thuê</h1>
    <p>Khách hàng: <strong th:text="${kh.hoTen}"></strong></p>
    <div class="msg-err" th:if="${error}" th:text="${error}"></div>
    <div class="form-wrap">
        <form th:action="@{/phieu-thue/tao}"
              th:object="${req}" method="post">
            <div class="form-group">
                <label>Ngày hẹn lấy *</label>
                <input type="date" th:field="*{ngayHenLay}"/>
                <span class="field-err" th:if="${#fields.hasErrors('ngayHenLay')}" th:errors="*{ngayHenLay}"></span>
            </div>
            <div class="form-group">
                <label>Ngày hẹn trả *</label>
                <input type="date" th:field="*{ngayHenTra}"/>
                <span class="field-err" th:if="${#fields.hasErrors('ngayHenTra')}" th:errors="*{ngayHenTra}"></span>
            </div>
            <a th:href="@{/gio-hang}" class="btn">Quay lại giỏ hàng</a>
            <button type="submit" class="btn btn-primary">Xác nhận đặt thuê</button>
        </form>
    </div>
    <p style="margin-top:14px; color:#666; font-size:13px;">
        Tiền đặt cọc = 30% tổng giá thuê. Vui lòng xác nhận sau khi đặt.
    </p>
</div>
</body>
</html>
