<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">
    <h1 th:text="${isEdit} ? 'Cập nhật khách hàng' : 'Thêm khách hàng mới'">Form</h1>

    <div class="msg-err" th:if="${error}" th:text="${error}"></div>

    <div class="form-wrap">
        <form th:action="${isEdit} ? @{/admin/{id}/sua(id=${khachHangId})} : @{/admin/them}"
              th:object="${form}" method="post">

            <div class="msg-err" th:if="${#fields.hasAnyErrors()}">
                Vui lòng nhập đầy đủ và đúng các trường bắt buộc (*)
            </div>

            <div class="form-group">
                <label>Họ tên *</label>
                <input type="text" th:field="*{hoTen}"/>
                <span class="field-err" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}"></span>
            </div>

            <div class="form-group">
                <label>Username *</label>
                <input type="text" th:field="*{username}" 
                    th:readonly="${isEdit}" 
                    th:style="${isEdit} ? 'background-color: #e9ecef; cursor: not-allowed;' : ''"/>
                <span class="field-err" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>

            <div class="form-group">
                <label>Password *</label>
                <!-- hiển thị **** theo độ dài password thật, không cho thay đổi -->
                <input th:if="${isEdit}"
                       type="text"
                       th:value="${#strings.repeat('*', #strings.length(form.password != null ? form.password : ''))}"
                       readonly
                       style="background-color: #e9ecef; cursor: not-allowed; pointer-events: none;"/>
                <!-- giá trị thật vẫn submit qua hidden -->
                <input th:if="${isEdit}" type="hidden" th:field="*{password}"/>
                <!-- thêm mới thì input password bình thường -->
                <input th:if="${!isEdit}" type="password" th:field="*{password}"/>
                <span class="field-err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}"/>
                <span class="field-err" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label>Số điện thoại *</label>
                <input type="text" th:field="*{soDienThoai}"/>
                <span class="field-err" th:if="${#fields.hasErrors('soDienThoai')}" th:errors="*{soDienThoai}"></span>
            </div>

            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" th:field="*{diaChi}"/>
            </div>

            <div class="form-group">
                <label>Ngày sinh (YYYY-MM-DD)</label>
                <input type="text" th:field="*{dob}" placeholder="1990-01-15"/>
            </div>

            <div class="form-group">
                <label>Vai trò *</label>
                <select th:field="*{role}"
                        th:style="${isEdit and form.role == 'admin'} ? 'pointer-events: none; background-color: #e9ecef;' : ''">
                    <option value="customer">Khách hàng</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="form-group" th:if="${isEdit}">
                <label>Trạng thái tài khoản</label>
                <select th:field="*{isActive}"
                        th:disabled="${form.role == 'admin'}"
                        th:style="${form.role == 'admin'} ? 'pointer-events: none; background-color: #e9ecef;' : ''">
                    <option value="true">Hoạt động</option>
                    <option value="false">Bị khóa</option>
                </select>
                <!-- hidden field để đảm bảo giá trị vẫn submit khi select bị disabled -->
                <input th:if="${form.role == 'admin'}" type="hidden" th:field="*{isActive}"/>
            </div>

            <button type="submit" class="btn"
                    th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'">Lưu</button>
            <a href="/admin" class="btn">Hủy</a>
        </form>
    </div>
</div>
</body>
</html>
