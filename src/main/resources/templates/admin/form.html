<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">
    <h1 th:text="${isEdit} ? 'Cập nhật khách hàng' : 'Thêm khách hàng mới'">Form</h1>

    <div class="msg-err" th:if="${error}" th:text="${error}"></div>

    <div class="form-wrap">
        <form th:action="${isEdit} ? @{/admin/{id}/sua(id=${khachHangId})} : @{/admin/them}"
              th:object="${form}" method="post">

            <div class="form-group">
                <label>Họ tên *</label>
                <input type="text" th:field="*{hoTen}"/>
                <span class="field-err" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}"></span>
            </div>

            <div class="form-group">
                <label>Username *</label>
                <input type="text" th:field="*{username}" 
                    th:readonly="${isEdit}" 
                    th:style="${isEdit} ? 'background-color: #e9ecef; cursor: not-allowed;' : ''"/>
                <span class="field-err" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>

            <div class="form-group" th:if="${!isEdit}">
                <label>Password *</label>
                <input type="password" th:field="*{password}"/>
                <span class="field-err" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}"/>
                <span class="field-err" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label>Số điện thoại *</label>
                <input type="text" th:field="*{soDienThoai}"/>
                <span class="field-err" th:if="${#fields.hasErrors('soDienThoai')}" th:errors="*{soDienThoai}"></span>
            </div>

            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" th:field="*{diaChi}"/>
            </div>

            <div class="form-group">
                <label>Ngày sinh (YYYY-MM-DD)</label>
                <input type="text" th:field="*{dob}" placeholder="1990-01-15"/>
            </div>

            <div class="form-group">
                <label>Vai trò *</label>
                <select th:field="*{role}"
                        th:style="${isEdit and form.role == 'admin'} ? 'pointer-events: none; background-color: #e9ecef;' : ''">
                    <option value="customer">Khách hàng</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button type="submit" class="btn"
                    th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'">Lưu</button>
            <a href="/admin" class="btn">Hủy</a>
        </form>
    </div>
</div>
</body>
</html>
