<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{layout :: head}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">
    <h1>Danh sách khách hàng</h1>

    <div class="msg-ok"  th:if="${success}" th:text="${success}"></div>
    <div class="msg-err" th:if="${error}"   th:text="${error}"></div>

    <a href="/admin/them" class="btn">+ Thêm khách hàng</a>

    <table style="margin-top:14px;">
        <thead>
            <tr>
                <th>#</th>
                <th>Mã KH</th>
                <th>Họ tên</th>
                <th>Username</th>
                <th>Email</th>
                <th>SĐT</th>
                <th>Vai trò</th>
                <th>Trạng thái</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="kh, s : ${khachHangs}">
                <td th:text="${s.count}"></td>
                <td th:text="'KH-' + ${kh.id}"></td>
                <td th:text="${kh.hoTen}"></td>
                <td th:text="${kh.username}"></td>
                <td th:text="${kh.email}"></td>
                <td th:text="${kh.soDienThoai}"></td>
                <td>
                    <span th:if="${kh.role == 'admin'}" style="font-weight:bold;">Admin</span>
                    <span th:if="${kh.role != 'admin'}" >Khách hàng</span>
                </td>
                <td>
                    <span th:if="${kh.isActive}" style="font-weight:bold;">Hoạt động</span>
                    <span th:if="${!kh.isActive}">Bị khóa</span>
                </td>
                <td>
                    <a th:href="@{/admin/{id}/sua(id=${kh.id})}" class="btn">Sửa</a>
                    <form class="inline" th:action="@{/admin/{id}/doi-trang-thai(id=${kh.id})}" method="post"
                                th:onsubmit="${kh.isActive} ? 'return confirm(\'Khóa tài khoản này?\')' : 'return confirm(\'Mở khóa tài khoản này?\')'">
                        <button type="submit"
                                th:class="${kh.isActive} ? 'btn btn-danger' : 'btn btn-success'"
                                th:disabled="${kh.role == 'admin'}"
                                th:style="${kh.role == 'admin'} ? 'cursor: not-allowed; opacity: 0.5;' : ''"
                                th:title="${kh.role == 'admin'} ? 'Không thể thay đổi trạng thái tài khoản Admin' : ''"
                                th:text="${kh.isActive} ? 'Khóa' : 'Mở khóa'">
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(khachHangs)}">
                <td colspan="9" style="text-align:center;">Chưa có khách hàng nào</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
