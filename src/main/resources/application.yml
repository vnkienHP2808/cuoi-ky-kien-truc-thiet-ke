spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rental?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
        dialect: org.hibernate.dialect.MySQLDialect
  thymeleaf:
    encoding: UTF-8
    cache: false

server:
  port: 8080

logging:
  level:
    rent.custome.demo: INFO

